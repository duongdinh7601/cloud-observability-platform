services:
  # Database service
  postgres:
    ports:
      - "5433:5432"

  # Backend service
  log-service:
    ports:
      - "8000:8000"

  # Frontend service
  frontend:
    command: ["npm", "run", "dev", "--", "-H", "0.0.0.0"]
    ports:
      - "3000:3000"
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

# Volumes
volumes:
  frontend_node_modules:
