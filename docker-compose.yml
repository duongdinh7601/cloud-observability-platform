services:
  # Database service
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: logs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logs"]
      interval: 2s
      timeout: 3s
      retries: 20

  # Backend service
  log-service:
    build:
      context: ./services/log-service
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/logs
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend service
  frontend:
    build:
      context: ./frontend
    depends_on:
      - log-service

# Volumes
volumes:
  postgres_data:
