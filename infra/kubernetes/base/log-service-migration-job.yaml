apiVersion: batch/v1
kind: Job
metadata:
  name: log-service-migrations
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrations
          image: log-service
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: log-service-db
                  key: DATABASE_URL
          command: ["python", "-m", "alembic", "upgrade", "head"]
