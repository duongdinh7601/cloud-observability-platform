apiVersion: v1
kind: Secret
metadata:
  name: log-service-db
type: Opaque
stringData:
  DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/logs

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-service
  template:
    metadata:
      labels:
        app: log-service
    spec:
      containers:
        - name: log-service
          image: ghcr.io/duongdinh7601/cloud-observability-platform-log-service:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: log-service-db
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20

---

apiVersion: v1
kind: Service
metadata:
  name: log-service
spec:
  type: ClusterIP
  selector:
    app: log-service
  ports:
    - port: 8000
      targetPort: 8000